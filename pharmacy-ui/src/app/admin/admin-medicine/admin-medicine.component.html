<div class="p-6 bg-white rounded shadow">
  <h1 class="text-2xl font-bold mb-4">Products Admin</h1>

  <!-- Add / Edit Form -->
  <form class="flex flex-col gap-2 mb-6" (ngSubmit)="newProduct.id ? updateProduct() : addProduct()">
    <input type="text" placeholder="Name" [(ngModel)]="newProduct.name" name="name" class="border p-2 rounded"/>
    <input type="text" placeholder="Category" [(ngModel)]="newProduct.category" name="category" class="border p-2 rounded"/>
    <input type="number" placeholder="Price" [(ngModel)]="newProduct.price" name="price" class="border p-2 rounded"/>
    <input type="number" placeholder="Stock" [(ngModel)]="newProduct.stockQuantity" name="stock" class="border p-2 rounded"/>
    <button type="submit" class="bg-blue-600 text-white p-2 rounded flex items-center justify-center gap-2">
      <lucide-icon [img]="PlusCircle" [size]="18" color="white"></lucide-icon>
      {{ newProduct.id ? 'Update' : 'Add' }} Product
    </button>
  </form>

  <!-- Products Table -->
  <table class="w-full border-collapse border border-gray-200">
    <thead>
    <tr class="bg-gray-100">
      <th class="border p-2">ID</th>
      <th class="border p-2">Name</th>
      <th class="border p-2">Category</th>
      <th class="border p-2">Price</th>
      <th class="border p-2">Stock</th>
      <th class="border p-2">Actions</th>
    </tr>
    </thead>
    <tbody>
      @for (product of products(); track product.productId) {
    <tr>
      <td class="border p-2">{{ product.productId}}</td>
      <td class="border p-2">{{ product.name }}</td>
      <td class="border p-2">{{ product.manufacturer }}</td>
      <td class="border p-2">{{ product.price }}</td>
      <td class="border p-2">{{ product.stockQuantity }}</td>
      <td class="border p-2 flex gap-2">
        <button (click)="editProduct(product)" class="text-blue-600 flex items-center gap-1">
          <lucide-icon [img]="Edit2" [size]="16" color="blue"></lucide-icon> Edit
        </button>
        <button (click)="deleteProduct(product.productId!)" class="text-red-600 flex items-center gap-1">
          <lucide-icon [img]="Trash2" [size]="16" color="red"></lucide-icon> Delete
        </button>
      </td>
    </tr>
    }
    </tbody>
  </table>
</div>
